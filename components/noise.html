<div class="oscillator-panel">

    <h2>NOISE GENERATOR</h2>

    <label>
        <input type="checkbox" id="noiseEnable">
        Active
    </label>

    <div class="section-title">
        Noise Type
    </div>

    <div class="control-group">
        <label>Type</label>

        <select id="noiseType">
            <option value="white">White Noise</option>
            <option value="pink">Pink Noise</option>
        </select>
    </div>

    <div class="control-group">
        <label>Volume</label>

        <input
            type="range"
            id="noiseVolume"
            min="0"
            max="1"
            step="0.01"
            value="0.3"
        >
    </div>

</div>
