<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SynthLab Pro</title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="css/variables.css"
    >

    <link
        rel="stylesheet"
        href="css/layout.css"
    >

    <link
        rel="stylesheet"
        href="css/oscillator.css"
    >

    <link
        rel="stylesheet"
        href="css/piano.css"
    >

    <link
        rel="stylesheet"
        href="css/main.css"
    >

</head>

<body>

    <!-- HEADER -->

    <div id="header-container"></div>

    <!-- CONTENIDO PRINCIPAL -->

    <main>

        <!-- OSCILADORES -->

        <section
            class="oscillator-grid"
        >

            <div
                id="osc1-container"
            ></div>

            <div
                id="osc2-container"
            ></div>

            <div
                id="osc3-container"
            ></div>

        </section>

        <!-- MASTER -->

        <section>

            <div
                id="master-container"
            ></div>

        </section>

        <!-- PIANO -->

        <section>

            <div
                id="piano-container"
            ></div>

        </section>

    </main>

    <!-- JAVASCRIPT -->

    <script
        type="module"
        src="js/app.js"
    ></script>

</body>

</html>
